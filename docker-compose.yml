services:
  # 기존 DB 컨테이너
  db:
    image: postgres:15
    container_name: qr_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: qrorder
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 📊 프로메테우스 (데이터 수집기) 추가
  prometheus:
    image: prom/prometheus:latest
    container_name: tory-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    # Mac 환경에서 호스트 통신을 위한 설정
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 📈 그라파나 (시각화 대시보드) 추가
  grafana:
    image: grafana/grafana:latest
    container_name: tory-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data: